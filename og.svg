<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0d1117"/>
  <rect x="0" y="0" width="1200" height="4" fill="#E05C1A"/>

  <!-- Logo mark -->
  <rect x="80" y="72" width="72" height="72" fill="#E05C1A"/>
  <line x1="101" y1="85" x2="95"  y2="129" stroke="white" stroke-width="8" stroke-linecap="square"/>
  <line x1="116" y1="83" x2="116" y2="131" stroke="white" stroke-width="8" stroke-linecap="square"/>
  <line x1="131" y1="85" x2="137" y2="129" stroke="white" stroke-width="8" stroke-linecap="square"/>

  <!-- Wordmark -->
  <text x="168" y="126" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="40" font-weight="700" fill="#e6edf3">Clawmapper</text>

  <!-- Divider -->
  <line x1="80" y1="190" x2="1120" y2="190" stroke="#30363d" stroke-width="1"/>

  <!-- Headline -->
  <text x="80" y="295" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="52" font-weight="700" fill="#e6edf3">No code. No database.</text>
  <text x="80" y="365" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="52" font-weight="700" fill="#e6edf3">Just roadmap.</text>

  <!-- Subtext — two lines -->
  <text x="80" y="450" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="19" fill="#8b949e">A GitHub template that turns Claude Code into your</text>
  <text x="80" y="478" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="19" fill="#8b949e">roadmap assistant. No seats. No renewals.</text>

  <!-- Domain -->
  <text x="80" y="562" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="20" fill="#E05C1A">clawmapper.ai</text>

  <!-- Bottom border + anchor point to force full height render -->
  <rect x="0" y="626" width="1200" height="4" fill="#E05C1A" opacity="0.4"/>
  <rect x="0" y="629" width="1200" height="1" fill="#0d1117"/>
</svg>
