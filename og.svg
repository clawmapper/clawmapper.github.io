<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0d1117"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="1" x2="1200" y2="1" stroke="#30363d" stroke-width="1"/>
  <line x1="0" y1="629" x2="1200" y2="629" stroke="#30363d" stroke-width="1"/>

  <!-- Logo mark -->
  <rect x="80" y="80" width="96" height="96" fill="#E05C1A"/>
  <line x1="107" y1="97" x2="99" y2="159" stroke="white" stroke-width="10" stroke-linecap="square"/>
  <line x1="128" y1="94" x2="128" y2="162" stroke="white" stroke-width="10" stroke-linecap="square"/>
  <line x1="149" y1="97" x2="157" y2="159" stroke="white" stroke-width="10" stroke-linecap="square"/>

  <!-- Clawmapper wordmark -->
  <text x="196" y="148" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="52" font-weight="700" fill="#e6edf3" letter-spacing="-1">Clawmapper</text>

  <!-- Divider -->
  <line x1="80" y1="220" x2="1120" y2="220" stroke="#30363d" stroke-width="1"/>

  <!-- Main headline -->
  <text x="80" y="330" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="64" font-weight="700" fill="#e6edf3">No code. No database.</text>
  <text x="80" y="410" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="64" font-weight="700" fill="#e6edf3">Just roadmap.</text>

  <!-- Subtext -->
  <text x="80" y="500" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="24" fill="#8b949e">A GitHub template that turns Claude Code into your roadmap assistant.</text>

  <!-- Domain -->
  <text x="80" y="570" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="22" fill="#E05C1A">clawmapper.ai</text>

  <!-- Right accent -->
  <rect x="1100" y="80" width="4" height="470" fill="#E05C1A" opacity="0.3"/>
</svg>
